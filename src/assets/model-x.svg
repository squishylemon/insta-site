<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="sky" x1="400" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="200" y1="200" x2="600" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2997ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2997ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="body" x1="150" y1="180" x2="650" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="40%" stop-color="#1d1d1f"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <linearGradient id="highlight" x1="300" y1="160" x2="500" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#sky)"/>
  <ellipse cx="400" cy="320" rx="350" ry="60" fill="url(#glow)"/>

  <!-- Ground reflection -->
  <ellipse cx="400" cy="340" rx="280" ry="20" fill="#2997ff" opacity="0.06"/>

  <!-- Rear 3/4 SUV silhouette (Model X inspired: tall roofline, subtle falcon-wing ridge) -->
  <g transform="translate(120, 80)">
    <!-- Shadow -->
    <ellipse cx="280" cy="248" rx="220" ry="18" fill="#000" opacity="0.5"/>

    <!-- Body -->
    <path
      d="M 60 200
         L 80 140
         Q 100 100 160 95
         L 280 88
         Q 380 85 440 100
         L 500 115
         Q 520 120 530 140
         L 540 175
         Q 545 195 530 210
         L 500 220
         L 480 225
         L 120 225
         Q 55 225 60 200 Z"
      fill="url(#body)"
    />

    <!-- Roof / falcon wing ridge hint -->
    <path
      d="M 160 95
         L 200 75
         Q 280 65 360 72
         L 420 82
         Q 460 88 480 105
         L 500 115"
      stroke="#3a3a3e"
      stroke-width="2"
      fill="none"
      opacity="0.6"
    />

    <!-- Side highlight -->
    <path
      d="M 200 130
         L 380 120
         L 460 140
         L 440 180
         L 200 190 Z"
      fill="url(#highlight)"
    />

    <!-- Rear window -->
    <path
      d="M 80 140
         L 100 110
         L 160 100
         L 140 155 Z"
      fill="#0a0a0c"
      opacity="0.8"
    />

    <!-- Side windows -->
    <path
      d="M 170 102
         L 280 95
         L 400 100
         L 420 130
         L 380 155
         L 160 160 Z"
      fill="#0a0a0c"
      opacity="0.7"
    />

    <!-- Wheels -->
    <circle cx="160" cy="225" r="32" fill="#111"/>
    <circle cx="160" cy="225" r="22" fill="#1a1a1e"/>
    <circle cx="160" cy="225" r="8" fill="#2a2a2e"/>

    <circle cx="440" cy="225" r="32" fill="#111"/>
    <circle cx="440" cy="225" r="22" fill="#1a1a1e"/>
    <circle cx="440" cy="225" r="8" fill="#2a2a2e"/>

    <!-- Taillight strip -->
    <rect x="68" y="165" width="6" height="40" rx="2" fill="#cc2222" opacity="0.7"/>
    <rect x="68" y="165" width="6" height="40" rx="2" fill="#ff4444" opacity="0.3"/>

    <!-- Rear diffuser hint -->
    <path d="M 60 210 L 75 225 L 90 210" stroke="#222" stroke-width="2" fill="none"/>
  </g>
</svg>
